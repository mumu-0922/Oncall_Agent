name: oncall-agent-prod

x-oncall-env: &oncall-env
  env_file:
    - .env.production
  environment:
    APP_LOG_FILE: "/var/log/oncall-agent/app.log"
    DEBUG: "false"
    HOST: "0.0.0.0"
    PORT: "9900"
    MCP_CLS_URL: "http://mcp-cls:8003/mcp"
    MCP_MONITOR_URL: "http://mcp-monitor:8004/mcp"
    AIOPS_MONITOR_PROVIDER: "prometheus"
    AIOPS_PROMETHEUS_URL: "http://prometheus:9090"
    AIOPS_ALERTMANAGER_URL: "http://alertmanager:9093"
    AIOPS_LOG_PROVIDER: "local_vps"
    AIOPS_ALLOW_MOCK: "false"

x-oncall-image: &oncall-image
  build:
    context: .
    dockerfile: Dockerfile
  image: oncall-agent:prod
  restart: unless-stopped

services:
  api:
    <<: [*oncall-env, *oncall-image]
    container_name: oncall-agent-api
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9900"]
    ports:
      - "127.0.0.1:${HOST_API_PORT:-9900}:9900"
    volumes:
      - oncall-logs:/var/log/oncall-agent
      - rag-data:/app/data/rag
    depends_on:
      mcp-cls:
        condition: service_started
      mcp-monitor:
        condition: service_started
      prometheus:
        condition: service_started
      alertmanager:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9900/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-cls:
    <<: [*oncall-env, *oncall-image]
    container_name: oncall-agent-mcp-cls
    command: ["python", "mcp_servers/cls_server.py"]
    environment:
      MCP_CLS_HOST: "0.0.0.0"
      MCP_CLS_PORT: "8003"
      MCP_CLS_LOG_FILE: "/var/log/oncall-agent/mcp_cls.log"
    ports:
      - "127.0.0.1:${HOST_MCP_CLS_PORT:-8003}:8003"
    volumes:
      - oncall-logs:/var/log/oncall-agent
      - nginx-logs:/var/log/nginx:ro
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8003/mcp || true); test \"$$code\" = \"200\" -o \"$$code\" = \"400\" -o \"$$code\" = \"405\" -o \"$$code\" = \"406\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-monitor:
    <<: [*oncall-env, *oncall-image]
    container_name: oncall-agent-mcp-monitor
    command: ["python", "mcp_servers/monitor_server.py"]
    environment:
      MCP_MONITOR_HOST: "0.0.0.0"
      MCP_MONITOR_PORT: "8004"
      MCP_MONITOR_LOG_FILE: "/var/log/oncall-agent/mcp_monitor.log"
    ports:
      - "127.0.0.1:${HOST_MCP_MONITOR_PORT:-8004}:8004"
    volumes:
      - oncall-logs:/var/log/oncall-agent
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8004/mcp || true); test \"$$code\" = \"200\" -o \"$$code\" = \"400\" -o \"$$code\" = \"405\" -o \"$$code\" = \"406\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  prometheus:
    image: quay.io/prometheus/prometheus:v2.55.1
    container_name: oncall-agent-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:${HOST_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      node-exporter:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: quay.io/prometheus/alertmanager:v0.27.0
    container_name: oncall-agent-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:${HOST_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: oncall-agent-node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run/docker/netns)($$|/)
      - --no-collector.netstat
      - --no-collector.softnet
    ports:
      - "127.0.0.1:${HOST_NODE_EXPORTER_PORT:-9100}:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: oncall-agent-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/oncall-agent.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  oncall-logs:
  nginx-logs:
  rag-data:
  prometheus-data:
  alertmanager-data:
